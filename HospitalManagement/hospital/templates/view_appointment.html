{% extends 'navigationbar.html' %}

{% block body %}
{% load static %}

<div class="container" style="margin-top:50px">
<h2 class="text-center">View Appointment</h2>
<br><br>
<table class="table table-hover" >
    <thead>
    <tr>
        <th>Doctor Name</th>
        <th>Patient Name</th>
        <th>Date</th>
        <th>Time</th>
        <th>Delete</th>
    </tr>
    </thead>

    <tbody>
    {% for i in appoint %}
    <tr>
        <td>{{i.doctor}}</td>
        <td>{{i.patient}}</td>
        <td>{{i.date1}}</td>
        <td>{{i.time1}}</td>
        <td>{% if user_role == 'admin' %}<a href="{% url 'delete_appointment' i.id %}" onclick="return confirm('Do you really want to delete')" class="btn btn-danger">Delete</a>{% else %}-{% endif %}</td>
    </tr>
    {% endfor %}


    </tbody>
</table>
</div>

{% endblock %}
